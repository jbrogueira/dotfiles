# ~/.config/starship.toml
# --- General ---
add_newline = true
command_timeout = 1000

# --- Prompt symbol ---
[character]
success_symbol = "[➜](bold green) "
error_symbol = "[✗](bold red) "

# --- Directory section ---
[directory]
truncation_length = 3
truncate_to_repo = true
format = "📂 [$path]($style) "
style = "bold cyan"

# --- Git section ---
[git_branch]
symbol = "🌿 "
format = "on [$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style)) '
style = "bold yellow"

# --- Python environment ---
[python]
symbol = "🐍 "
#pyenv_version_name = true
format = "via [$symbol$version]($style) "
style = "bold green"
python_binary = "python3"

# --- Conda environment ---
[conda]
symbol = "🧪 "
ignore_base = false
format = "[$symbol$environment]($style) "
style = "bold bright-green"

# --- Command duration ---
[cmd_duration]
format = "⏱️ [$duration]($style) "
style = "dim yellow"

# --- OS symbol ---
[os]
format = "[$symbol]($style) "
style = "bold dimmed white"
disabled = false

[os.symbols]
Macos = "🍎 "
Linux = "🐧 "
Windows = "🪟 "

# --- Time (optional) ---
[time]
disabled = false
format = "🕐 [$time]($style) "
style = "dim white"

# --- NodeJS (optional) ---
[nodejs]
format = "🟢 [v$version]($style) "
style = "bold green"

# --- Rust (optional) ---
[rust]
symbol = "🦀 "
format = "[$symbol$version]($style) "
style = "bold red"
